# Configurazione Resorgiva
title: "Resorgiva"
tagline: "Il benessere nasce alla sorgente."
description: "Blog di benessere quotidiano: idratazione, alimentazione, movimento, mente e lifestyle. Piccole abitudini concrete, spiegate da amiche esperte."
url: "https://ste2808.github.io"
baseurl: ""

# Author principale (per SEO)
author:
  name: "Redazione Resorgiva"
  email: "s.vozzi@gmail.com"

# Logo per Schema.org
logo: "/assets/images/logo.png"

# Social profiles
social:
  name: "Resorgiva"
  links:
    - https://github.com/StE2808/resorgiva

# Impostazioni SEO
lang: it_IT
timezone: Europe/Rome

# Autori
collections:
  authors:
    output: false

# Build settings
markdown: kramdown
encoding: utf-8
permalink: /:title/

# Paginazione
paginate: 12
paginate_path: "/pagina/:num/"

# Plugin
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# Feed RSS
feed:
  path: feed.xml
  excerpt_only: false
  posts_limit: 250

# Defaults
defaults:
  # jekyll-seo-tag legge SOLO page["image"] (front matter), non ha un fallback sitewide
  # in _config.yml: questo default lo simula per ogni pagina che non imposta un'immagine propria.
  - scope:
      path: ""
    values:
      image: "/assets/images/social-default.png"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      sitemap: true
      description: ""
      image_alt: ""
  - scope:
      path: "admin"
    values:
      sitemap: false

# Esclusioni
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - docs
