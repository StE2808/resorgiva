backend:
  name: github
  repo: StE2808/resorgiva
  branch: main
  base_url: https://sveltia-cms-auth.s-vozzi.workers.dev

publish_mode: editorial_workflow

media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"

locale: 'it'

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "posts"
    label: "Articoli"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"
      - label: "Titolo"
        name: "title"
        widget: "string"
        required: true
        hint: "Titolo editoriale dell'articolo. Può essere creativo."
      - label: "Titolo SEO (opzionale)"
        name: "seo_title"
        widget: "string"
        required: false
        hint: "Max 60 caratteri. Se vuoto, usa il titolo normale."
      - label: "Meta Description"
        name: "description"
        widget: "text"
        required: false
        hint: "120-155 caratteri. Includi la parola chiave principale."
      - label: "Data pubblicazione"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD HH:mm:ss ZZ"
        required: true
      - label: "Autrice"
        name: "author"
        widget: "select"
        options:
          - { label: "Autrice 1 (Idratazione)", value: "autrice-1" }
          - { label: "Autrice 2 (Alimentazione)", value: "autrice-2" }
          - { label: "Autrice 3 (Movimento)", value: "autrice-3" }
          - { label: "Autrice 4 (Mente)", value: "autrice-4" }
          - { label: "Autrice 5 (Lifestyle)", value: "autrice-5" }
        required: true
      - label: "Pilastro"
        name: "category"
        widget: "select"
        options:
          - { label: "Idratazione", value: "idratazione" }
          - { label: "Alimentazione", value: "alimentazione" }
          - { label: "Movimento", value: "movimento" }
          - { label: "Mente", value: "mente" }
          - { label: "Lifestyle", value: "lifestyle" }
        required: true
      - label: "Tag"
        name: "tags"
        widget: "list"
        required: false
      - label: "Immagine copertina"
        name: "image"
        widget: "image"
        required: false
        hint: "1200x630px per social sharing."
      - label: "Didascalia immagine"
        name: "image_caption"
        widget: "string"
        required: false
      - label: "Alt Text Immagine"
        name: "image_alt"
        widget: "string"
        required: false
        hint: "Descrivi cosa si VEDE nell'immagine."
      - label: "Sunto"
        name: "excerpt"
        widget: "text"
        required: true
      - label: "Parola Chiave Principale (promemoria)"
        name: "focus_keyword"
        widget: "string"
        required: false
      - label: "Contenuto"
        name: "body"
        widget: "markdown"
        required: true
        buttons:
          - bold
          - italic
          - link
          - heading-two
          - heading-three
          - heading-four
          - quote
          - bulleted-list
          - numbered-list
          - code
          - code-block

  - name: "authors"
    label: "Autrici"
    folder: "_authors"
    create: true
    slug: "{{slug}}"
    fields:
      - label: "Nome completo"
        name: "name"
        widget: "string"
        required: true
      - label: "Slug"
        name: "slug"
        widget: "string"
        required: true
      - label: "Pilastro"
        name: "pillar"
        widget: "select"
        options:
          - { label: "Idratazione", value: "idratazione" }
          - { label: "Alimentazione", value: "alimentazione" }
          - { label: "Movimento", value: "movimento" }
          - { label: "Mente", value: "mente" }
          - { label: "Lifestyle", value: "lifestyle" }
        required: true
      - label: "Bio"
        name: "bio"
        widget: "text"
        required: false
      - label: "Immagine profilo"
        name: "avatar"
        widget: "image"
        required: false
      - label: "Instagram"
        name: "instagram"
        widget: "string"
        required: false
